name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (no tests)
        run: ./gradlew build -x test --no-daemon --no-parallel --stacktrace

      - name: Test
        run: ./gradlew test --no-daemon --no-parallel --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nodewire-jar
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 14
