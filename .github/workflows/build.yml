name: Build

on:
  push:
    branches: [main, master, "port/**"]
  pull_request:
    branches: [main, master, "port/**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Tests run locally only — ModDevGradle remaps Forge classes
      # (SRG → Mojang names) without refreshing META-INF SHA-384
      # digests, so on a fresh CI cache JarVerifier rejects test
      # discovery with "digest error for IForgeBlockGetter.class".
      # Locally the cache is in a known-good state and tests pass.
      - name: Build (no tests)
        run: ./gradlew build -x test --no-daemon --stacktrace

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nodewire-jar
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 14
