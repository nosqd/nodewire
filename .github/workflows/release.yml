name: Release

on:
  push:
    tags:
      # Stable: v1.2.3
      - "v*"
      # Dev/test build for the in-flight port (e.g. dev-v0.1.0-neoforge-1.21.1).
      # Both patterns flow through the same job; prerelease is detected from
      # the tag name so dev pushes don't promote to "latest".
      - "dev-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (no tests)
        run: ./gradlew build -x test --no-daemon --stacktrace

      - name: Generate dependency table
        run: |
          chmod +x .github/scripts/build-deps-table.sh
          .github/scripts/build-deps-table.sh > deps-table.md
          echo "--- deps-table.md ---"
          cat deps-table.md

      # Tag like `dev-v...`, `v...-dev...`, `-rc...`, `-alpha...`, `-beta...`
      # → prerelease. Anything else → stable.
      - name: Decide prerelease flag
        id: prerel
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" == dev-* || "$tag" == *-dev* || "$tag" == *-rc* || "$tag" == *-alpha* || "$tag" == *-beta* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected prerelease tag: $tag"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable tag: $tag"
          fi

      - name: Read mod_version from gradle.properties
        id: ver
        run: |
          v=$(grep '^mod_version=' gradle.properties | cut -d= -f2-)
          echo "mod_version=$v" >> "$GITHUB_OUTPUT"
          echo "Detected mod_version=$v"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerel.outputs.prerelease }}
          generate_release_notes: true
          append_body: true
          body_path: deps-table.md
          files: |
            build/libs/*.jar
            scripting/build/libs/*.jar

      # Mirror the release to Modrinth. Uses the same deps-table.md as
      # the GitHub body so the version's changelog on Modrinth carries
      # the identical Runtime / Integrations / Bundled / Toolchain
      # tables. Dependency slugs declared explicitly so Modrinth shows
      # the proper required / optional list — Modrinth doesn't infer
      # these from neoforge.mods.toml.
      - name: Publish to Modrinth
        if: vars.MODRINTH_PROJECT_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: Nodewire ${{ steps.ver.outputs.mod_version }}
          version: ${{ steps.ver.outputs.mod_version }}
          version-type: ${{ steps.prerel.outputs.prerelease == 'true' && 'beta' || 'release' }}
          changelog-file: deps-table.md
          files: |
            build/libs/!(*-sources|*-dev|*-javadoc).jar
            scripting/build/libs/!(*-sources|*-dev|*-javadoc).jar
          loaders: neoforge
          game-versions: 1.21.1
          # Format: slug(scope){platform:id?}. Slugs match Modrinth
          # project slugs; mc-publish resolves them at publish time.
          dependencies: |
            kotlin-for-forge(required)
            create(optional)
            create-aeronautics(optional)
            sable(optional)
            cc-tweaked(optional)
            jei(optional)
            emi(optional)
          fail-mode: warn
